[tool.poetry]
name = "marathon"
version = "0.1.0"
description = "training infra"
authors = ["Marcel Langer <dev@marcel.science>"]
license = "MIT"

[tool.poetry.dependencies]
python = ">=3.7"
specable = ">=0.1.1"
comms =  { git = "https://github.com/sirmarcel/comms.git", branch = "main" }
PyYAML = "*"
# flax
# jax
# numpy

[tool.poetry.dev-dependencies]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 92

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # isort
    "I",
]
typing-modules = ["jaxtyping"]

# E741: don't worry about short variable names
# E731: don't worry about lambdas
# F722: jaxtyping+ruff problems, see https://github.com/astral-sh/ruff/issues/9860
# E402: we're ok with importing in arbitrary places (for inline testing)
ignore = ["E741", "E731", "F722", "E402"]

[tool.ruff.lint.isort]
section-order = ["numpy", "jax", "future", "standard-library", "third-party", "typing", "first-party", "local-folder"]
no-lines-before = ["jax"]

[tool.ruff.lint.isort.sections]
"numpy" = ["numpy"]
"jax" = ["jax", "jax.numpy"]
"typing" = ["jaxtyping", "typing"]
